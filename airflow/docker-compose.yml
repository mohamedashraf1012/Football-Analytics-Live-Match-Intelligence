x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR:                     ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES:                ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:  ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:-true}
    AIRFLOW__CORE__DEFAULT_TIMEZONE:             Africa/Cairo

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}
      @postgres/${POSTGRES_DB:-airflow}

    AIRFLOW__WEBSERVER__SECRET_KEY:              ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG:           true

    AWS_ACCESS_KEY_ID:                           ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY:                       ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION:                          ${AWS_DEFAULT_REGION:-eu-west-1}
    S3_BUCKET:                                   ${S3_BUCKET:-football-de-2026}

    SNOWFLAKE_ACCOUNT:                           ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER:                              ${SNOWFLAKE_USER}
    SNOWFLAKE_PASSWORD:                          ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_WAREHOUSE:                         ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
    SNOWFLAKE_DATABASE:                          ${SNOWFLAKE_DATABASE:-FOOTBALLFLOW}
    SNOWFLAKE_ROLE:                              ${SNOWFLAKE_ROLE:-ACCOUNTADMIN}

    DBT_PROJECT_DIR:                             ${DBT_PROJECT_DIR:-/opt/airflow/dbt}
    DBT_PROFILES_DIR:                            ${DBT_PROFILES_DIR:-/opt/airflow/dbt}

    AIRFLOW__EMAIL__EMAIL_BACKEND:               ${AIRFLOW__EMAIL__EMAIL_BACKEND:-airflow.utils.email.send_email_smtp}
    AIRFLOW__SMTP__SMTP_HOST:                    ${AIRFLOW__SMTP__SMTP_HOST:-smtp.gmail.com}
    AIRFLOW__SMTP__SMTP_PORT:                    ${AIRFLOW__SMTP__SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER:                    ${AIRFLOW__SMTP__SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD:                ${AIRFLOW__SMTP__SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM:               ${AIRFLOW__SMTP__SMTP_MAIL_FROM:-}
    AIRFLOW__SMTP__SMTP_STARTTLS:                true

    JAVA_HOME:                                   /usr/lib/jvm/java-11-openjdk-amd64
    PYSPARK_PYTHON:                              python3
    SPARK_LOCAL_DIR:                             /opt/spark-temp

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./project:/opt/airflow/project
    - ./dbt:/opt/airflow/dbt
    - airflow-spark-temp:/opt/spark-temp

  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped
  user: "${AIRFLOW_UID:-50000}:0"

services:

  postgres:
    image: postgres:15
    container_name: footballflow_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB:       ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    ports:
      - "5432:5432"

  airflow-init:
    <<: *airflow-common
    container_name: footballflow_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/spark-temp
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname FootballFlow \
          --lastname Admin \
          --role Admin \
          --email admin@footballflow.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: footballflow_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: footballflow_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres-db:
    driver: local
  airflow-spark-temp:
    driver: local
