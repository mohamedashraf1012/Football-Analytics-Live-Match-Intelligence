# ─────────────────────────────────────────────
# STAGING MODELS
# ─────────────────────────────────────────────
models:
  - name: stg_players
    description: "Cleaned and renamed player records from raw_players"
    columns:
      - name: player_id
        tests: [unique, not_null]

  - name: stg_clubs
    description: "Cleaned and renamed club records from raw_clubs"
    columns:
      - name: club_id
        tests: [unique, not_null]

  - name: stg_competitions
    description: "Cleaned and renamed competition records from raw_competitions"
    columns:
      - name: competition_id
        tests: [unique, not_null]

  - name: stg_games
    description: "One row per match from raw_games. Home/away split happens in fact_matches."
    columns:
      - name: game_id
        tests: [unique, not_null]
      - name: home_club_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: away_club_id
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_appearances
    description: "One row per player per match from raw_appearances"
    columns:
      - name: appearance_id
        tests: [unique, not_null]
      - name: player_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: game_id
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_game_events
    description: "Match events. source_type distinguishes batch vs stream rows."
    columns:
      - name: game_event_id
        tests: [unique, not_null]
      - name: source_type
        # tests:
        #   - accepted_values:
        #       values: ['batch', 'stream']

  - name: stg_player_valuations
    description: "Full historical market value records. All rows preserved — not deduplicated."
    columns:
      - name: player_id
        tests:
          - not_null:
              config:
                severity: warn
      - name: valuation_date
        tests:
          - not_null:
              config:
                severity: warn
      - name: market_value_in_eur
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_transfers
    description: "Transfer transactions from raw_transfers"
    columns:
      - name: player_id
        tests:
          - not_null:
              config:
                severity: warn