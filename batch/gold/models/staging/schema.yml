sources:
  - name: FOOTBALL_DE
    database: FOOTBALL_DE # اسم الـ database في Snowflake
    schema: RAW
    description: "Raw data loaded from spark parquet files via COPY INTO"
    tables:
      - name: RAW_APPEARANCES
        description: "One row per player per match"
      - name: RAW_CLUBS
        description: "Club information"
      - name: RAW_COMPETITIONS
        description: "Competition information"
      - name: RAW_GAMES
        description: "Game information, one row per match"
      - name: RAW_GAME_EVENTS
        description: "Tag ID to tag name mapping"
      - name: RAW_PLAYERS
        description: "Player information"
      - name: RAW_PLAYER_VALUATIONS
        description: "Player valuation information"
      - name: RAW_TRANSFERS
        description: "Transfer information, one row per transfer transaction"




