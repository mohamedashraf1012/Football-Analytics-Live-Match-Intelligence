version: 2

models:
  - name: dim_player
    description: "Player dimension. One row per player. Current/latest values only — historical market values are in fact_player_valuations."
    columns:
      - name: sk_player
        description: "Surrogate key — generated by dbt_utils.generate_surrogate_key"
        tests: [unique, not_null]
      - name: player_id
        description: "Natural key from source"
        tests:
          - not_null:
              config:
                severity: warn
      # - name: player_full_name
      #   tests: [not_null]
      # - name: position
      #   tests:
      #     - accepted_values:
      #         values: ['Attack', 'Midfield', 'Defender', 'Goalkeeper']
      # - name: is_active
      #   tests:
      #     - accepted_values:
      #         values: [true, false]

  - name: dim_club
    description: "Club dimension. One row per club."
    columns:
      - name: sk_club
        description: "Surrogate key"
        tests: [not_null]
      - name: club_id
        description: "Natural key from source"
        tests:
          - not_null:
              config:
                severity: warn
      # - name: club_name
      #   tests: [not_null]

  - name: dim_competitions
    description: "Competition dimension. One row per competition."
    columns:
      - name: sk_competition
        description: "Surrogate key"
        tests: [unique, not_null]
      # - name: competition_id
      #   description: "Natural key from source"
      #   tests: [unique, not_null]
      # - name: competition_name
      #   tests: [not_null]

  - name: dim_date
    description: "Calendar date dimension. Generated from raw_games date range."
    columns:
      - name: sk_date
        description: "Surrogate key"
        tests: [unique, not_null]
      - name: date_id
        description: "Natural key — the actual calendar date"
        tests:
          - not_null:
              config:
                severity: warn
      - name: year
        tests:
          - not_null:
              config:
                severity: warn
      - name: month
        tests:
          - not_null:
              config:
                severity: warn